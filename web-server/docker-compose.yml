volumes:
  dataprotection-keys:
  mongo-data:

services:
  app:
    build: .
    container_name: nodesentinel-app

    ports:
      - "80:80"

    depends_on:
      - mongo

    environment:
      ASPNETCORE_ENVIRONMENT: Production

    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys

    restart: unless-stopped

  mongo:
    image: mongo:latest
    container_name: nodesentinel-mongo

    volumes:
      - mongo-data:/data/db

    restart: unless-stopped
